apiVersion: apps/v1
kind: Deployment
metadata:
  name: springboot-probe-demo
  labels:
    app: springboot-probe-demo

spec:
  replicas: 1

  selector:
    matchLabels:
      app: springboot-probe-demo

  template:
    metadata:
      labels:
        app: springboot-probe-demo

    spec:
      imagePullSecrets:
      - name: dockerhub-secret
      terminationGracePeriodSeconds: 30

      containers:
      - name: springboot-app
        image: sanjeevk95/springboot-k8s-probe-demo:TAG

        ports:
        - containerPort: 8080

        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"

        startupProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          failureThreshold: 30
          periodSeconds: 5

        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 2
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 2
          failureThreshold: 3

        lifecycle:
          preStop:
            exec:
              command: ["sh", "-c", "sleep 10"]
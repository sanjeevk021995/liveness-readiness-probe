apiVersion: apps/v1
kind: Deployment
metadata:
  name: springboot-probe-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: springboot-probe-demo
  template:
    metadata:
      labels:
        app: springboot-probe-demo
    spec:
      containers:
      - name: springboot-app
        image: yourdockerhub/springboot-k8s-probe-demo:1
        ports:
        - containerPort: 8080

        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"

        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 2
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8080
          initialDelaySeconds: 20
          periodSeconds: 5
          timeoutSeconds: 2
          failureThreshold: 3